paths:
  /roles:
    get:
      summary: Get all roles
      tags: 
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Number of items per page
        - in: query
          name: sortBy
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sorting order
        - in: query
          name: search
          schema:
            type: string
          description: Filter roles by name or description
      responses:
        '200':
          description: A list of roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Roles retrieved successfully"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
    post:
      summary: Create a new role
      tags: 
        - Roles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: USER
                description:
                  type: string
                  example: Standart Application User
                permissions:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Role created successfully"
                  data:
                    $ref: '#/components/schemas/Role'
        '400':
          description: Validation or Relation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                        message:
                          type: string
              examples:
                validationError:
                  summary: "Validation error"
                  value:
                    status: "error"
                    message: "Bad request"
                    errors:
                      - parameter: "name"
                        message: "Name must be at least 3 characters long"
                relationError:
                  summary: "Relation Error"
                  value:
                    status: "error"
                    message: "One or more Permission(s) provided do not exist"
        '409':
          description: Role already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Role with this name already exists"
  /roles/{id}:
    get:
      summary: Get role by ID
      tags: 
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Role found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Role retrieved successfully"
                  data:
                    $ref: '#/components/schemas/Role'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Role not found"
    put:
      summary: Update role
      tags: 
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "USER"
                description:
                  type: string
                  example: "Standard Application User"
                permissions:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Role updated successfully"
                  data:
                    $ref: '#/components/schemas/Role'
        '400':
          description: Validation or Relation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                        message:
                          type: string
              examples:
                validationError:
                  summary: "Validation error"
                  value:
                    status: "error"
                    message: "Bad request"
                    errors:
                      - parameter: "name"
                        message: "Name must be at least 3 characters long"
                relationError:
                  summary: "Relation Error"
                  value:
                    status: "error"
                    message: "One or more Permission(s) provided do not exist"
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Role not found"
        '409':
          description: Role already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Role with this name already exists"
    delete:
      summary: Delete role
      tags: 
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Role deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Role deleted successfully"
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Role not found"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forbidden'