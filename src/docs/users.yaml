paths:
  /users:
    get:
      summary: Get all users
      tags: 
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Users data retrieved successfully!"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      tags: 
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password, displayName]
              properties:
                username:
                  type: string
                  example: "wirosableng"
                email:
                  type: string
                  example: "wirosableng@gmail.com"
                password:
                  type: string
                  example: "yntkTS#212"
                displayName:
                  type: string
                  example: "Wiro Sableng"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status::
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "User created successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Bad request"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                          example: "username"
                        message:
                          type: string
                          example: "Username is required"
                      example:
                        - parameter: "username"
                          message: "Username is required"
                        - parameter: "email"
                          message: "Email is required"
                        - parameter: "displayName"
                          message: "Display Name is required"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "A record with the provided value already exists"
  /users/password:
    patch:
      summary: Update user password
      tags: 
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword:
                  type: string
                  example: "yntkTS#212"
                newPassword:
                  type: string
                  example: "okeGAS#02"
                confirmPassword:
                  type: string
                  example: "okeGAS#02"
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Password updated successfully"
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Bad request"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                          example: "currentPassword"
                        message:
                          type: string
                          example: "Current password is required"
                      example:
                        - parameter: "currentPassword"
                          message: "Current password is required"
                        - parameter: "newPassword"
                          message: "New password is required"
                        - parameter: "confirmPassword"
                          message: "Confirm password is required"
  /users/{id}:
    get:
      summary: Get user by ID
      tags: 
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "User data retrieved successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "User not found"
    put:
      summary: Update user details
      tags: 
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "wirosableng"
                displayName:
                  type: string
                  example: "Wiro Sableng"
                email:
                  type: string
                  example: "wirosableng@gmail.com"
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "User updated successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Bad request"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                          example: "username"
                        message:
                          type: string
                          example: "Username is required"
                      example:
                        - parameter: "username"
                          message: "Username is required"
                        - parameter: "email"
                          message: "Email is required"
                        - parameter: "displayName"
                          message: "Display Name is required"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "User not found"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "A record with the provided value already exists"
    delete:
      summary: Delete user
      tags: 
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "User deleted successfully"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "User not found"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Forbidden: You don't have the required permission"
  /users/{id}/roles:
    put:
      summary: Assign roles to user
      tags: 
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              properties:
                roleIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Roles assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Roles assigned successfully"
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation or Relation Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        parameter:
                          type: string
                        message:
                          type: string
              examples:
                validationError:
                  summary: "Validation error"
                  value:
                    status: "error"
                    message: "Bad request"
                    errors:
                      - parameter: "roles"
                        message: "At least one role ID is required"
                relationError:
                  summary: "Relation Error"
                  value:
                    status: "error"
                    message: "One or more Role(s) provided do not exist"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "User not found"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Forbidden: You don't have the required permission"